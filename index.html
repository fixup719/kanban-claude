<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 로그인 오버레이 -->
  <div class="login-overlay" id="login-overlay">
    <div class="login-box">
      <h1>Kanban Board</h1>
      <p class="login-subtitle">작업을 정리하고 생산성을 높이세요</p>
      <button id="google-login-btn" type="button">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Google로 로그인
      </button>
      <div class="login-divider"><span>또는</span></div>
      <button id="guest-login-btn" type="button">게스트로 시작하기</button>
    </div>
  </div>

  <header>
    <h1>Kanban Board</h1>
    <div class="header-right">
      <div id="user-info"></div>
      <button id="add-card-btn">+ 카드 추가</button>
    </div>
  </header>

  <main class="board">
    <section class="column" id="todo" data-status="todo">
      <div class="column-header">
        <h2>TO-DO</h2>
        <span class="card-count">0</span>
      </div>
      <div class="card-list" id="todo-list"></div>
    </section>

    <section class="column" id="in-progress" data-status="in-progress">
      <div class="column-header">
        <h2>IN-PROGRESS</h2>
        <span class="card-count">0</span>
      </div>
      <div class="card-list" id="in-progress-list"></div>
    </section>

    <section class="column" id="done" data-status="done">
      <div class="column-header">
        <h2>DONE</h2>
        <span class="card-count">0</span>
      </div>
      <div class="card-list" id="done-list"></div>
    </section>
  </main>

  <!-- 카드 추가 모달 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h3>새 카드 추가</h3>
      <label for="card-title">제목</label>
      <input type="text" id="card-title" placeholder="카드 제목을 입력하세요" maxlength="50">
      <label for="card-desc">설명</label>
      <textarea id="card-desc" placeholder="카드 설명을 입력하세요 (선택)" rows="3" maxlength="200"></textarea>
      <label for="card-priority">우선순위</label>
      <select id="card-priority">
        <option value="low">낮음</option>
        <option value="medium" selected>보통</option>
        <option value="high">높음</option>
      </select>
      <div class="modal-actions">
        <button id="modal-cancel">취소</button>
        <button id="modal-confirm">추가</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
